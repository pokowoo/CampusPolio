spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://<RDS_ENDPOINT>:3306/campuspolio?serverTimezone=Asia/Seoul
    username: <RDS_USERNAME>
    password: <RDS_PASSWORD>

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: <REDIS_ENDPOINT>   # ElastiCache 쓰면 여기
      port: 6379

logging:
  level:
    org.hibernate.SQL: warn
version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: campus-mysql

    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: campuspolio

    ports:
      - "3307:3306"

    command:
      --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7
    container_name: campus-redis

    ports:
      - "6380:6379"